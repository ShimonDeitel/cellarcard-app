name: Cellarcard
options:
  bundleIdPrefix: com.shimondeitel.winecellar
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Cellarcard:
    type: application
    platform: iOS
    sources:
      - path: Cellarcard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.winecellar
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Cellarcard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CellarcardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CellarcardTests
      - path: Cellarcard.storekit
    dependencies:
      - target: Cellarcard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.winecellar.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CellarcardUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CellarcardUITests
    dependencies:
      - target: Cellarcard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.winecellar.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Cellarcard:
    build:
      targets:
        Cellarcard: all
        CellarcardTests: [test]
        CellarcardUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Cellarcard.storekit
    test:
      config: Debug
      storeKitConfiguration: Cellarcard.storekit
      targets:
        - CellarcardTests
        - CellarcardUITests
    archive:
      config: Release
